<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite: Aniversário de 2 Anos da Agatha 🎉</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Glitter Background -->
    <div class="glitter-bg"></div>
    
    <!-- Main Container -->
    <div class="container">
        <!-- Header with Music Control -->
        <div class="header">
            <button id="musicToggle" class="music-btn" title="Ativar/Desativar Música">
                <i class="fas fa-volume-up"></i>
            </button>
            <audio id="bgMusic" loop>
                <source src="assets/audio/birthday-music.mp3" type="audio/mpeg">
            </audio>
        </div>

        <!-- Main Card Container -->
        <div class="card-wrapper">
            <!-- Front Card -->
            <div class="card card-front">
                <div class="card-content">
                    <!-- Decorative Elements -->
                    <div class="balloon balloon-pink"></div>
                    <div class="balloon balloon-white"></div>
                    <div class="balloon balloon-gold"></div>
                    <div class="balloon balloon-pink-light"></div>

                    <!-- Main Content -->
                    <div class="content-wrapper">
                        <div class="header-decoration">
                            <span class="sparkle">✨</span>
                            <h1 class="title">Agatha</h1>
                            <span class="sparkle">✨</span>
                        </div>

                        <div class="subtitle">está fazendo</div>
                        <div class="age-display">2 Anos</div>

                        <div class="theme-section">
                            <img src="assets/icons/marie-cat.png" alt="Marie" class="marie-icon">
                            <p class="theme-text">Tema: Marie, a Gatinha</p>
                        </div>

                        <div class="confetti-container">
                            <div class="confetti"></div>
                            <div class="confetti"></div>
                            <div class="confetti"></div>
                            <div class="confetti"></div>
                            <div class="confetti"></div>
                        </div>

                        <button class="see-more-btn">Ver Detalhes ↓</button>
                    </div>
                </div>
            </div>

            <!-- Details Card -->
            <div class="card card-details">
                <div class="card-content">
                    <h2 class="details-title">Detalhes da Festa</h2>

                    <!-- Event Details -->
                    <div class="details-section">
                        <!-- Date -->
                        <div class="detail-item">
                            <i class="fas fa-calendar-alt"></i>
                            <div class="detail-text">
                                <span class="label">Data</span>
                                <span class="value">16 de Agosto de 2026</span>
                            </div>
                        </div>

                        <!-- Time -->
                        <div class="detail-item">
                            <i class="fas fa-clock"></i>
                            <div class="detail-text">
                                <span class="label">Horário</span>
                                <span class="value">11:00 da Manhã</span>
                            </div>
                        </div>

                        <!-- Location -->
                        <div class="detail-item">
                            <i class="fas fa-map-marker-alt"></i>
                            <div class="detail-text">
                                <span class="label">Local</span>
                                <span class="value">Rua Francisco Leal Queiroz, 113<br>Centro, Itaporã - MS</span>
                            </div>
                        </div>
                    </div>

                    <!-- Countdown Timer -->
                    <div class="countdown-section">
                        <h3>Faltam:</h3>
                        <div class="countdown">
                            <div class="countdown-item">
                                <span class="countdown-value" id="days">0</span>
                                <span class="countdown-label">Dias</span>
                            </div>
                            <div class="countdown-item">
                                <span class="countdown-value" id="hours">0</span>
                                <span class="countdown-label">Horas</span>
                            </div>
                            <div class="countdown-item">
                                <span class="countdown-value" id="minutes">0</span>
                                <span class="countdown-label">Minutos</span>
                            </div>
                            <div class="countdown-item">
                                <span class="countdown-value" id="seconds">0</span>
                                <span class="countdown-label">Segundos</span>
                            </div>
                        </div>
                    </div>

                    <!-- Action Buttons -->
                    <div class="action-buttons">
                        <!-- WhatsApp RSVP -->
                        <a href="https://wa.me/5567996579728?text=Olá%21%20Gostaria%20de%20confirmar%20presença%20na%20festa%20de%202%20anos%20da%20Agatha%21%20%F0%9F%8E%89%F0%9F%8E%82" 
                           target="_blank" 
                           class="btn btn-whatsapp">
                            <i class="fab fa-whatsapp"></i>
                            Confirmar Presença
                        </a>

                        <!-- Google Maps -->
                        <a href="https://www.google.com/maps/search/Rua+Francisco+Leal+Queiroz,+113,+Centro,+Itaporã,+MS,+Brasil" 
                           target="_blank" 
                           class="btn btn-maps">
                            <i class="fas fa-map-location-dot"></i>
                            Ver no Mapa
                        </a>
                    </div>

                    <!-- Back Button -->
                    <button class="back-btn">← Voltar</button>

                    <!-- Decorative Elements -->
                    <div class="balloon balloon-pink"></div>
                    <div class="balloon balloon-gold"></div>
                </div>
            </div>
        </div>

        <!-- Floating Balloons -->
        <div class="floating-balloons">
            <div class="balloon-float balloon-float-1"></div>
            <div class="balloon-float balloon-float-2"></div>
            <div class="balloon-float balloon-float-3"></div>
            <div class="balloon-float balloon-float-4"></div>
            <div class="balloon-float balloon-float-5"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="script.js"></script>
</body>
</html>
